name: Update Tailwind Browser

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest Tailwind version
        id: tw
        env:
          MY_PATCH: ${{ vars.MY_PATCH }}
        run: |
          VERSION=$(npm view @tailwindcss/browser version)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          ENCODED_VERSION="${MAJOR}$(printf '%02d' $MINOR)$(printf '%02d' $PATCH)"
          PLUGIN_VERSION="${MY_PATCH}.${ENCODED_VERSION}"
          echo "plugin_version=$PLUGIN_VERSION" >> $GITHUB_OUTPUT
          echo "Tailwind $VERSION → plugin $PLUGIN_VERSION"

      - name: Read current plugin version
        id: current
        run: |
          CURRENT=$(grep -oP 'exports\.version\s*=\s*\K[0-9]+\.[0-9]+' dist/plugin.js || echo "0.0")
          echo "version=$CURRENT" >> $GITHUB_OUTPUT

      - name: Check if update is needed
        id: check
        run: |
          NEW="${{ steps.tw.outputs.plugin_version }}"
          CURRENT="${{ steps.current.outputs.version }}"
          if [ "$NEW" = "$CURRENT" ]; then
            echo "needed=false" >> $GITHUB_OUTPUT
          else
            echo "needed=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate commit message
        id: commit_msg
        if: steps.check.outputs.needed == 'true'
        run: |
          MSG="chore: update tailwind-browser.js to ${{ steps.tw.outputs.version }}"
          echo "message=$MSG" >> $GITHUB_OUTPUT

      - name: Download tailwind-browser.js
        if: steps.check.outputs.needed == 'true'
        run: |
          VERSION="${{ steps.tw.outputs.version }}"
          URL="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@${VERSION}/dist/index.global.js"
          mkdir -p dist/tailwind
          curl -fsSL "$URL" -o dist/tailwind/tailwind.js
          [ -s dist/tailwind/tailwind.js ] || (echo "Empty file — aborting." && exit 1)

      - name: Minify tailwind-browser.js
        if: steps.check.outputs.needed == 'true'
        run: |
          npm install -g terser
          terser dist/tailwind/tailwind.js --compress --mangle --output dist/tailwind/tailwind.js

      - name: Update exports.version in plugin.js
        if: steps.check.outputs.needed == 'true'
        run: |
          NEW_VER="${{ steps.tw.outputs.plugin_version }}"
          TW_VER="${{ steps.tw.outputs.version }}"
          sed -i "s|exports\.version = .*;|exports.version = ${NEW_VER};|" dist/plugin.js
          sed -i "s|// scheme:.*|// scheme: my_patch . encoded_tailwind_version  ->  ${TW_VER} = ${NEW_VER}|" dist/plugin.js

      - name: Create Pull Request
        if: steps.check.outputs.needed == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "update/tailwind-${{ steps.tw.outputs.version }}"
          commit-message: "${{ steps.commit_msg.outputs.message }}"
          title: "Update @tailwindcss/browser to ${{ steps.tw.outputs.version }} (plugin ${{ steps.tw.outputs.plugin_version }})"
          body: |
            Automated update of bundled `dist/tailwind/tailwind.js`.
            | | Value |
            |---|---|
            | Previous plugin version | `${{ steps.current.outputs.version }}` |
            | New @tailwindcss/browser | `${{ steps.tw.outputs.version }}` |
            | New plugin version | `${{ steps.tw.outputs.plugin_version }}` |
            **Version scheme:** `my_patch . encoded_tailwind_version` → Tailwind `4.2.1` with `MY_PATCH=8` = `8.40201`
          labels: |
            dependencies
            automated

      - name: Enable auto-merge
        if: steps.check.outputs.needed == 'true' && steps.cpr.outputs.pull-request-number != ''
        run: gh pr merge --auto --squash "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
